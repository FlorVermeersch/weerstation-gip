<!DOCTYPE html>
<html>
<head>
  <title>Weerstation</title>
  <style>
    body {
      font-family: Arial;
      background: #f2f2f2;
      margin: 0;
      padding: 20px;
    }

    .container {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      max-width: 700px;
      margin: auto;
    }

    .box {
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.2);
      text-align: center;
    }

    .value {
      font-size: 30px;
      color: blue;
    }
  </style>
</head>
<body>

<div class="container">
  <div class="box">UV<br><div class="value" id="uv">...</div></div>
  <div class="box">Licht<br><div class="value" id="licht">...</div></div>
  <div class="box">Temperatuur<br><div class="value" id="temp">...</div> °C</div>
  <div class="box">Luchtvochtigheid<br><div class="value" id="hum">...</div> %</div>
  <div class="box">Luchtdruk<br><div class="value" id="druk">...</div> hPa</div>
  <div class="box">Windrichting<br><div class="value" id="wind">...</div></div>
</div>

<script>
async function loadData() {

  const channelID = "JOUW_CHANNEL_ID";

  const url = `https://api.thingspeak.com/channels/${channelID}/feeds/last.json?nocache=${Date.now()}`;

  const res = await fetch(url);
  const data = await res.json();

  document.getElementById("uv").innerText = data.field1;
  document.getElementById("licht").innerText = data.field2;
  document.getElementById("temp").innerText = data.field3;
  document.getElementById("hum").innerText = data.field4;
  document.getElementById("druk").innerText = data.field5;
  document.getElementById("wind").innerText = data.field6;
}

loadData();
setInterval(loadData, 15000);
</script>

</body>
</html>
