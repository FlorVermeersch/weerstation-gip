<!DOCTYPE html>
<html>
<head>
  <title>Weerstation</title>
  <style>
    body {
      font-family: Arial;
      background: #4A2ED1;
      margin: 0;
      padding: 20px;
      text-align: center;
    }

    h1 {
      color: white;
      margin-bottom: 20px;
    }

    .container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      max-width: 900px;
      margin: auto;
    }

    .box {
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    }

    .label {
      font-size: 16px;
      margin-bottom: 10px;
      color: #333;
    }

    .value {
      font-size: 32px;
      color: #0077ff;
      font-weight: bold;
    }
  </style>
</head>
<body>

<h1>Live Weerstation</h1>

<div class="container">
  <div class="box"><div class="label">Temperatuur</div><div class="value" id="temp">...</div> °C</div>
  <div class="box"><div class="label">Neerslag</div><div class="value" id="rain">...</div> mm</div>
  <div class="box"><div class="label">Luchtdruk</div><div class="value" id="druk">...</div> hPa</div>
  <div class="box"><div class="label">Luchtvochtigheid</div><div class="value" id="hum">...</div> %</div>
  <div class="box"><div class="label">Windrichting</div><div class="value" id="winddir">...</div></div>
  <div class="box"><div class="label">Windsnelheid</div><div class="value" id="windspeed">...</div> km/h</div>
  <div class="box"><div class="label">UV</div><div class="value" id="uv">...</div></div>
  <div class="box"><div class="label">Lichtsterkte</div><div class="value" id="light">...</div></div>
</div>

<script>
async function loadData() {

  const channelID = "3293235";
  const apiKey = "I6LPXW7JW4PHDEQE";

  const url = `https://api.thingspeak.com/channels/${channelID}/feeds/last.json?api_key=${apiKey}&nocache=${Date.now()}`;

  const res = await fetch(url);
  const data = await res.json();

  document.getElementById("temp").innerText = data.field1;
  document.getElementById("rain").innerText = data.field2;
  document.getElementById("druk").innerText = data.field3;
  document.getElementById("hum").innerText = data.field4;
  document.getElementById("winddir").innerText = data.field5;
  document.getElementById("windspeed").innerText = data.field6;
  document.getElementById("uv").innerText = data.field7;
  document.getElementById("light").innerText = data.field8;
}

loadData();
setInterval(loadData, 15000);
</script>

</body>
</html>
